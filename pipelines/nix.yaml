parameters:
  yubikey: 'false'

steps:
- ${{ if eq(parameters.yubikey, 'true') }}:
  - task: CmdLine@2
    displayName: 'Install pcsclite (Linux)'
    condition: eq(variables['Agent.OS'], 'Linux')
    inputs:
      script: sudo apt-get update && sudo apt-get install -y libpcsclite-dev

- task: CmdLine@2
  displayName: 'Bootstrap vcpkg'
  inputs:
    script: |
      cd $(Build.SourcesDirectory)
      git clone https://github.com/microsoft/vcpkg.git
      cd vcpkg
      git checkout ed8445dd2a9ba44e0e3ace4e952b2e33130082d9
      ./bootstrap-vcpkg.sh -disableMetrics
    workingDirectory: '$(Build.SourcesDirectory)'
    failOnStderr: false

- ${{ if ne(parameters.yubikey, 'true') }}:
  - task: CMake@1
    displayName: 'Configure MPSS'
    inputs:
      cmakeArgs: -S . -B build -GNinja -DCMAKE_BUILD_TYPE='${{ parameters.configuration }}' -DMPSS_BUILD_TESTS=ON -DMPSS_BUILD_MPSS_OPENSSL_STATIC=ON -DCMAKE_TOOLCHAIN_FILE=$(Build.SourcesDirectory)/vcpkg/scripts/buildsystems/vcpkg.cmake
      workingDirectory: '$(Build.SourcesDirectory)'

- ${{ if eq(parameters.yubikey, 'true') }}:
  - task: CMake@1
    displayName: 'Configure MPSS (YubiKey)'
    inputs:
      cmakeArgs: -S . -B build -GNinja -DCMAKE_BUILD_TYPE='${{ parameters.configuration }}' -DMPSS_BUILD_TESTS=ON -DMPSS_BUILD_MPSS_OPENSSL_STATIC=ON -DMPSS_BACKEND_YUBIKEY=ON -DCMAKE_TOOLCHAIN_FILE=$(Build.SourcesDirectory)/vcpkg/scripts/buildsystems/vcpkg.cmake
      workingDirectory: '$(Build.SourcesDirectory)'

- task: CMake@1
  displayName: 'Build MPSS'
  inputs:
    cmakeArgs: --build build --config '${{ parameters.configuration }}'
    workingDirectory: '$(Build.SourcesDirectory)'

- ${{ if ne(parameters.yubikey, 'true') }}:
  - task: CmdLine@2
    displayName: 'Run MPSS unit tests'
    inputs:
      script: 'build/bin/mpss_tests'
      workingDirectory: '$(Build.SourcesDirectory)'
