# This file selects the correct job definition based on system and buildType.

parameters:
  debug: 'false'
  yubikey: 'false'

jobs:

- ${{ if eq(parameters.name, 'Windows') }}:
  - ${{ if eq(parameters.yubikey, 'true') }}:
    - job: ${{ parameters.name }}_YubiKey
      displayName: "${{ parameters.name }} (YubiKey)"
      timeoutInMinutes: 180
      pool:
        vmImage: 'windows-latest'
      steps:
      - template: windows.yaml
        parameters:
          yubikey: ${{ parameters.yubikey }}
          ${{ if eq(parameters.debug, 'true') }}:
            configuration: 'debug'
            path: 'Debug'
          ${{ if eq(parameters.debug, 'false') }}:
            configuration: 'release'
            path: 'Release'
  - ${{ if ne(parameters.yubikey, 'true') }}:
    - job: ${{ parameters.name }}
      displayName: ${{ parameters.name }}
      timeoutInMinutes: 180
      pool:
        vmImage: 'windows-latest'
      steps:
      - template: windows.yaml
        parameters:
          yubikey: ${{ parameters.yubikey }}
          ${{ if eq(parameters.debug, 'true') }}:
            configuration: 'debug'
            path: 'Debug'
          ${{ if eq(parameters.debug, 'false') }}:
            configuration: 'release'
            path: 'Release'

- ${{ if and(eq(parameters.name, 'Linux'), eq(parameters.yubikey, 'true')) }}:
  - job: ${{ parameters.name }}_YubiKey
    displayName: ${{ parameters.name }} (YubiKey)
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - template: nix.yaml
      parameters:
        artifactName: linux-drop
        yubikey: 'true'
        ${{ if eq(parameters.debug, 'true') }}:
          configuration: 'Debug'
        ${{ if eq(parameters.debug, 'false') }}:
          configuration: 'Release'

- ${{ if eq(parameters.name, 'macOS') }}:
  - ${{ if eq(parameters.yubikey, 'true') }}:
    - job: ${{ parameters.name }}_YubiKey
      displayName: "${{ parameters.name }} (YubiKey)"
      pool:
        vmImage: 'macos-latest'
      steps:
      - template: nix.yaml
        parameters:
          artifactName: macos-drop
          yubikey: ${{ parameters.yubikey }}
          ${{ if eq(parameters.debug, 'true') }}:
            configuration: 'Debug'
          ${{ if eq(parameters.debug, 'false') }}:
            configuration: 'Release'
  - ${{ if ne(parameters.yubikey, 'true') }}:
    - job: ${{ parameters.name }}
      displayName: ${{ parameters.name }}
      pool:
        vmImage: 'macos-latest'
      steps:
      - template: nix.yaml
        parameters:
          artifactName: macos-drop
          yubikey: ${{ parameters.yubikey }}
          ${{ if eq(parameters.debug, 'true') }}:
            configuration: 'Debug'
          ${{ if eq(parameters.debug, 'false') }}:
            configuration: 'Release'

- ${{ if eq(parameters.name, 'Android') }}:
  - job: ${{ parameters.name }}
    displayName: ${{ parameters.name }}
    timeoutInMinutes: 180
    pool:
      vmImage: 'windows-latest'
    steps:
    - template: android.yaml
      parameters:
        ${{ if eq(parameters.debug, 'true') }}:
          configuration: 'Debug'
        ${{ if eq(parameters.debug, 'false') }}:
          configuration: 'Release'

- ${{ if eq(parameters.name, 'iOS') }}:
  - job: ${{ parameters.name }}
    displayName: ${{ parameters.name }}
    pool:
      vmImage: 'macos-latest'
    steps:
    - template: ios.yaml
      parameters:
        ${{ if eq(parameters.debug, 'true') }}:
          configuration: 'Debug'
        ${{ if eq(parameters.debug, 'false') }}:
          configuration: 'Release'
