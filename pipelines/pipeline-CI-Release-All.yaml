# This defines a pipeline to build on Windows, macOS, Android, and iOS in Release mode,
# including YubiKey backend builds on Windows, macOS, and Linux.

trigger: none

stages:
  - stage: build
    displayName: Build
    jobs:
    - template: jobs.yaml
      parameters:
        debug: 'false'
        name: Windows
    - template: jobs.yaml
      parameters:
        debug: 'false'
        name: Windows
        yubikey: 'true'
    - template: jobs.yaml
      parameters:
        debug: 'false'
        name: macOS
    - template: jobs.yaml
      parameters:
        debug: 'false'
        name: macOS
        yubikey: 'true'
    - template: jobs.yaml
      parameters:
        debug: 'false'
        name: Linux
        yubikey: 'true'
    - template: jobs.yaml
      parameters:
        debug: 'false'
        name: Android
    - template: jobs.yaml
      parameters:
        debug: 'false'
        name: iOS
